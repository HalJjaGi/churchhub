name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: churchhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/churchhub_test
      - run: npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/churchhub_test
          NEXTAUTH_SECRET: test-secret
          AUTH_SECRET: test-secret
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/churchhub_test
          NEXTAUTH_SECRET: test-secret
          AUTH_SECRET: test-secret
